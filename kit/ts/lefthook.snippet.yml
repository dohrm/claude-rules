# TypeScript/React hooks — MERGE into the repo's root lefthook.yml.
#
# Thin triggers only: commands live in the justfile recipes (ts-lint / ts-check),
# which hold the path via the `ts_dir` variable. Layout-agnostic glob.
# Generated code is excluded in eslint.config.js via globalIgnores (see
# eslint.config.base.js) — never lint generated client/route code.

pre-commit:
  parallel: true
  commands:
    ts:
      glob: "**/*.{ts,tsx}"
      run: just ts-lint

pre-push:
  parallel: true
  commands:
    ts:
      glob: "**/*.{ts,tsx}"
      run: just ts-check
