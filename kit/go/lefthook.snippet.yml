# Go hooks — MERGE into the repo's root lefthook.yml.
#
# Thin triggers only: commands live in the justfile recipes (go-lint / go-check),
# which hold the path via the `go_dir` variable. Layout-agnostic glob.
# Aligned with rules/go/quality-gates.md (golangci-lint / test -race / govulncheck).
# golangci-lint + govulncheck must be installed (or baked into the runner image).

pre-commit:
  parallel: true
  commands:
    go:
      glob: "**/*.go"
      run: just go-lint

pre-push:
  parallel: true
  commands:
    go:
      glob: "**/*.go"
      run: just go-check
