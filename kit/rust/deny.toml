# cargo-deny configuration — Tier 2 supply-chain gate (licenses / advisories / sources).
# https://embarkstudios.github.io/cargo-deny/
# COPY to the workspace root and adapt the marked sections (registry, private crates).

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# ADAPT: ignore only with a reason + a tracking note. Empty is the goal.
ignore = [
    # "RUSTSEC-XXXX-YYYY", # why it's tolerated + what replaces it
]

[licenses]
confidence-threshold = 0.8
# A permissive default allow-list. Extend deliberately, never to "make it pass".
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-Proprietary",
]
# Private/proprietary local crates (publish = false) are exempt.
[licenses.private]
ignore = true
# ADAPT: your private registry, if any.
# registries = ["https://<your-gitea>/api/packages/<org>/cargo/"]

# ADAPT: clarify license for private crates that lack a license field, e.g.
# [[licenses.clarify]]
# crate = "my-domain-crate"
# expression = "LicenseRef-Proprietary"
# license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    # ADAPT: your private registry, if any.
    # "https://<your-gitea>/api/packages/<org>/cargo/",
]
